name: Build YouTube Video

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run video maker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python video_maker.py

      - name: Commit and push video
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add final_video.mp4 *.jpg *.mp3 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || git commit -m "Add generated video [skip ci]"
          git push
